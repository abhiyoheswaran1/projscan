name: Release

# Tag-triggered release pipeline (1.6.1+). One workflow that does everything:
#   1. Validates package.json + server.json versions match the tag.
#   2. Runs the full build / test / stability gate.
#   3. Slices the matching CHANGELOG entry for use as release notes.
#   4. Runs the supply-chain release gate and emits an SBOM.
#   5. Publishes to npm through Trusted Publishing / OIDC.
#   6. Creates the GitHub Release with `dist/tool-manifest.json` and the SBOM attached.
#   7. Publishes MCP Registry metadata through GitHub OIDC.
#
# Order note: npm publish runs BEFORE the GitHub Release is created. npm
# publish is the more common failure mode (registry 5xx, trusted-publisher
# configuration, sigstore outage); a workflow that creates the GH Release
# first and then fails on npm leaves an orphan release pointing at a tarball
# that doesn't exist. With this ordering, the worst-case partial state is
# "tag pushed, tests passed, npm has it, no GH Release yet" — recoverable via
# workflow_dispatch re-run (idempotent on both sides).
#
# Trigger model: push a tag matching `v*.*.*`. Prerelease tags (e.g.
# `v1.6.1-rc.1`) match the glob but are rejected at runtime — see the
# Resolve tag step. Re-run via workflow_dispatch with the tag input.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. v1.6.1)'
        required: true

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # npm provenance (sigstore)

concurrency:
  # Serialize per-tag so a re-run via workflow_dispatch can't collide with
  # the original tag-push run. `ref_name` strips `refs/tags/` so a tag-push
  # ($ref_name = "v1.6.1") and a same-tag dispatch (input = "v1.6.1") share
  # the same key.
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - name: Resolve tag (and reject prerelease tags)
        id: pick
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          # Allow only strict semver: vX.Y.Z with no -rc / -beta / +meta.
          # The tag glob v*.*.* matches prereleases too; this is the
          # second gate. Add prerelease branching here if/when needed.
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$tag' is not a strict semver vX.Y.Z. Prereleases / build metadata are not supported by this workflow."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pick.outputs.tag }}

      - name: Verify release tag is on main history
        env:
          TAG: ${{ steps.pick.outputs.tag }}
        run: |
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main
          tag_sha="$(git rev-parse "${TAG}^{commit}")"
          main_sha="$(git rev-parse origin/main)"
          if ! git merge-base --is-ancestor "$tag_sha" origin/main; then
            echo "::error::Release tags must be created from main after the release PR is merged. $TAG points at $tag_sha, which is not on origin/main ($main_sha)."
            exit 1
          fi
          echo "$TAG is on origin/main history ($tag_sha; origin/main $main_sha)."

      - name: Verify package.json + server.json versions match tag
        env:
          EXPECTED: ${{ steps.pick.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const expected = process.env.EXPECTED;
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
          const srv = JSON.parse(fs.readFileSync('.github/mcp-registry/server.json', 'utf8'));
          const errors = [];
          if (pkg !== expected) errors.push(`package.json version (${pkg}) != tag (${expected})`);
          if (srv.version !== expected) errors.push(`server.json#version (${srv.version}) != tag (${expected})`);
          if (srv.packages?.[0]?.version !== expected) errors.push(`server.json#packages[0].version (${srv.packages?.[0]?.version}) != tag (${expected})`);
          if (srv.description?.length > 100) errors.push(`server.json#description length (${srv.description.length}) exceeds MCP Registry max (100)`);
          if (errors.length > 0) {
            for (const e of errors) console.log(`::error::${e}`);
            console.log('::error::Fix the release metadata before tagging.');
            process.exit(1);
          }
          NODE

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run security:release-gate
      - run: npm test
      - run: npm run lint
      - run: node scripts/check-stability.mjs
      - run: npm run sbom:generate

      - name: Slice CHANGELOG entry
        env:
          VERSION: ${{ steps.pick.outputs.version }}
        run: |
          # Capture from the matching "## [X.Y.Z]" header up to (but not
          # including) the next "## [" header. Robust against any prev
          # version on either side.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { flag=1; print; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION. Add a '## [$VERSION] — YYYY-MM-DD' section before tagging."
            exit 1
          fi
          echo "Sliced $(wc -l < /tmp/release-notes.md) lines for $VERSION:"
          head -5 /tmp/release-notes.md

      - name: Publish to npm (idempotent)
        env:
          VERSION: ${{ steps.pick.outputs.version }}
        run: |
          if npm view "projscan@${VERSION}" version > /dev/null 2>&1; then
            echo "projscan@${VERSION} is already on npm — skipping (likely a re-run after a flake)."
            exit 0
          fi
          npm publish --provenance --access public

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.pick.outputs.tag }}
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — refreshing notes + asset."
            gh release edit "$TAG" --notes-file /tmp/release-notes.md
            gh release upload "$TAG" dist/tool-manifest.json --clobber
            gh release upload "$TAG" dist/projscan-sbom.cdx.json --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              dist/tool-manifest.json \
              dist/projscan-sbom.cdx.json
          fi

      - name: Check MCP Registry version
        id: mcp_registry
        env:
          VERSION: ${{ steps.pick.outputs.version }}
        run: |
          curl -fsSL 'https://registry.modelcontextprotocol.io/v0/servers?search=projscan' > /tmp/mcp-registry.json
          node <<'NODE'
          const fs = require('node:fs');
          const response = JSON.parse(fs.readFileSync('/tmp/mcp-registry.json', 'utf8'));
          const version = process.env.VERSION;
          const alreadyPublished = Array.isArray(response.servers)
            && response.servers.some((entry) =>
              entry?.server?.name === 'io.github.abhiyoheswaran1/projscan'
              && entry?.server?.version === version
            );
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `already_published=${alreadyPublished ? 'true' : 'false'}\n`);
          NODE

      - name: Install mcp-publisher
        if: steps.mcp_registry.outputs.already_published != 'true'
        run: |
          platform="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${platform}_${arch}.tar.gz" \
            -o mcp-publisher.tar.gz
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish MCP Registry metadata
        if: steps.mcp_registry.outputs.already_published != 'true'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish .github/mcp-registry/server.json

      - name: Summary
        env:
          TAG: ${{ steps.pick.outputs.tag }}
          VERSION: ${{ steps.pick.outputs.version }}
          REPO: ${{ github.repository }}
          MCP_REGISTRY_ALREADY_PUBLISHED: ${{ steps.mcp_registry.outputs.already_published }}
        run: |
          {
            echo "### Released $TAG"
            echo ""
            echo "- npm: https://www.npmjs.com/package/projscan/v/$VERSION"
            echo "- GitHub: https://github.com/$REPO/releases/tag/$TAG"
            if [ "$MCP_REGISTRY_ALREADY_PUBLISHED" = "true" ]; then
              echo "- MCP Registry: already published"
            else
              echo "- MCP Registry: published"
            fi
            echo ""
            echo "**Manual follow-up:** update the website manifest pin."
          } >> "$GITHUB_STEP_SUMMARY"
