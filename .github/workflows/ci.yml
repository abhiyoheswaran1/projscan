name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [18, 20, 22, 24]
        # 1.9+ — add a macOS leg on Node 22 only to validate the
        # wasi-sdk + tree-sitter wasm build chain on darwin. The
        # full matrix stays Linux-only because Node-version
        # compatibility is the dominant signal there; the macOS leg
        # exists to catch grammar-build / path / clang differences,
        # which one Node version exercises just as well as three.
        include:
          - os: macos-latest
            node-version: 22

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run security:release-gate
      - run: npm test
      - run: npm run smoke:packed-install
      - run: npm run lint
      - run: npm run check:stability
      - run: npm run check:graph-corpus

      # Dogfood: run projscan against itself. The CLI is freshly built above.
      # Threshold 90 because the false-positive ceiling we hit pre-1.1.1 is
      # gone, and we want CI to fail on any genuine regression.
      - name: Dogfood (projscan ci against the projscan repo)
        run: node dist/cli/index.js ci --min-score 90
